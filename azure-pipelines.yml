name: dockerlens-dev-$(Date:yyyyMMdd)$(Rev:.r)

trigger:
  branches:
    include:
      - dev

pr:
  branches:
    include:
      - dev

pool:
  vmImage: ubuntu-latest

variables:
  NODE_VERSION: '20.x'
  PNPM_VERSION: '10.32.1'

stages:
  - stage: validate
    displayName: Validate Dev Branch
    jobs:
      - job: build_and_test
        displayName: Build and Test
        steps:
          - checkout: self
            fetchDepth: 0

          - task: UseNode@1
            displayName: Use Node.js $(NODE_VERSION)
            inputs:
              version: $(NODE_VERSION)

          - script: |
              corepack enable
              corepack prepare pnpm@$(PNPM_VERSION) --activate
              pnpm --version
            displayName: Setup pnpm

          - script: |
              sudo apt-get update
              sudo apt-get install -y \
                libwebkit2gtk-4.1-dev \
                libgtk-3-dev \
                libayatana-appindicator3-dev \
                librsvg2-dev \
                libssl-dev \
                pkg-config \
                patchelf
            displayName: Install Linux system dependencies

          - script: |
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
              . "$HOME/.cargo/env"
              rustup component add rustfmt clippy
              cargo --version
              rustc --version
            displayName: Setup Rust

          - script: |
              corepack enable
              corepack prepare pnpm@$(PNPM_VERSION) --activate
              pnpm install --frozen-lockfile
            displayName: Install frontend dependencies

          - script: |
              corepack enable
              corepack prepare pnpm@$(PNPM_VERSION) --activate
              pnpm run lint
            displayName: Frontend lint

          - script: |
              corepack enable
              corepack prepare pnpm@$(PNPM_VERSION) --activate
              pnpm run test
            displayName: Frontend build gate

          - script: |
              . "$HOME/.cargo/env"
              cargo test --manifest-path src-tauri/Cargo.toml
            displayName: Cargo tests

          - script: |
              . "$HOME/.cargo/env"
              cargo fmt --manifest-path src-tauri/Cargo.toml --check
            displayName: Cargo fmt check

          - script: |
              . "$HOME/.cargo/env"
              cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings
            displayName: Cargo clippy

          - script: |
              . "$HOME/.cargo/env"
              cargo install cargo-audit --locked
              cargo audit --file src-tauri/Cargo.lock --deny warnings \
                --ignore RUSTSEC-2024-0413 \
                --ignore RUSTSEC-2024-0416 \
                --ignore RUSTSEC-2025-0057 \
                --ignore RUSTSEC-2024-0412 \
                --ignore RUSTSEC-2024-0418 \
                --ignore RUSTSEC-2024-0411 \
                --ignore RUSTSEC-2024-0417 \
                --ignore RUSTSEC-2024-0414 \
                --ignore RUSTSEC-2024-0415 \
                --ignore RUSTSEC-2024-0420 \
                --ignore RUSTSEC-2024-0419 \
                --ignore RUSTSEC-2024-0370 \
                --ignore RUSTSEC-2025-0081 \
                --ignore RUSTSEC-2025-0075 \
                --ignore RUSTSEC-2025-0080 \
                --ignore RUSTSEC-2025-0100 \
                --ignore RUSTSEC-2025-0098 \
                --ignore RUSTSEC-2024-0429
            displayName: Cargo audit
